name: Build macOS App

on:
  push:
    branches: [ main, master ]   # Adjust if needed
  workflow_dispatch:              # Allow manual triggering

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'   # Use your preferred version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build .app with PyInstaller
      run: |
        # If your script is app.pyw, rename or symlink to .py for PyInstaller
        cp app.pyw app.py
        pyinstaller --windowed --onefile --name "Elixir Macro (MacOS)" app.py
        # The .app will be in dist/MyApp.app

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-macOS
        path: dist/MyApp.app
