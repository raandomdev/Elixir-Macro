name: Build macOS App (Universal)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies (Tesseract)
        run: |
          brew update
          brew install tesseract

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install pyinstaller
          pip install pyautogui mss pytesseract discord-webhook pywebview ttkbootstrap pynput pillow requests

      - name: Find Tesseract path
        run: |
          TESS_PATH=$(brew --prefix tesseract)/bin/tesseract
          echo "TESSERACT_PATH=$TESS_PATH" >> $GITHUB_ENV

      - name: Build universal2 app with PyInstaller
        run: |
          pyinstaller \
            --name "Elixir Macro" \
            --onefile \
            --windowed \
            --target-architecture universal2 \
            --add-data "$TESSERACT_PATH:." \
            --hidden-import ttkbootstrap \
            --hidden-import pynput \
            --hidden-import pyautogui \
            app.pyw

      - name: Create .app bundle structure
        run: |
          mkdir -p "dist/Elixir Macro.app/Contents/MacOS"
          cp "dist/Elixir Macro" "dist/Elixir Macro.app/Contents/MacOS/Elixir Macro"
          cat > "dist/Elixir Macro.app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Elixir Macro</string>
            <key>CFBundleIdentifier</key>
            <string>com.elixir.macro</string>
            <key>CFBundleName</key>
            <string>Elixir Macro</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>1.1.2</string>
          </dict>
          </plist>
          EOF

      - name: Upload app bundle
        uses: actions/upload-artifact@v4
        with:
          name: Elixir-Macro-macOS-Universal
          path: dist/Elixir Macro.app
