name: Build macOS App

on:
  push:
    branches: [ main, master ]   # Adjust if needed
  workflow_dispatch:              # Allow manual triggering

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'   # Use your preferred version

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller   # Ensure PyInstaller is installed

    - name: Build .app with PyInstaller
      run: |
        # Copy app.pyw to app.py (PyInstaller works with .py)
        cp app.pyw app.py
        # Use python -m to guarantee the module is found
        python -m PyInstaller --windowed --onefile --name "Elixir-Macro-(MacOS)" app.py
        
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: MyApp-macOS
        path: dist/Elixir-Macro-(MacOS).app
